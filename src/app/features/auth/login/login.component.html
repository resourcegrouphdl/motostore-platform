<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5.5" cy="17.5" r="2.5"/><circle cx="18.5" cy="17.5" r="2.5"/>
          <path d="M8 17.5h7M2 12l2-7h10l2 4h3l2 3-3 1"/>
        </svg>
      </div>
      <span class="brand-name">MotoStore Platform</span>
    </div>

    <h1 class="login-title">Acceso de administrador</h1>
    <p class="login-sub">Portal exclusivo para administradores de la plataforma.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input class="field-input" id="email" type="email" formControlName="email"
               autocomplete="username" placeholder="admin@motostore.com"
               [class.field-input--error]="form.controls.email.invalid && form.controls.email.touched" />
        <span class="field-error" *ngIf="form.controls.email.invalid && form.controls.email.touched">
          Email inválido
        </span>
      </div>

      <div class="field">
        <label class="field-label" for="password">Contraseña</label>
        <div class="input-wrap">
          <input class="field-input" id="password" [type]="hidePass() ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password" placeholder="••••••••"
                 [class.field-input--error]="form.controls.password.invalid && form.controls.password.touched" />
          <button type="button" class="toggle-pass" (click)="hidePass.set(!hidePass())" [attr.aria-label]="hidePass() ? 'Mostrar contraseña' : 'Ocultar contraseña'">
            <svg *ngIf="hidePass()" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="!hidePass()" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="error-msg" *ngIf="error()">{{ error() }}</div>

      <button type="submit" class="btn-submit" [disabled]="loading()">
        <div class="spinner" *ngIf="loading()"></div>
        <span *ngIf="!loading()">Iniciar sesión</span>
      </button>
    </form>
  </div>
</div>
