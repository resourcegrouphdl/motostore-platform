<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar" role="navigation" aria-label="Platform navigation">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5.5" cy="17.5" r="2.5"/><circle cx="18.5" cy="17.5" r="2.5"/>
          <path d="M8 17.5h7M2 12l2-7h10l2 4h3l2 3-3 1"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">MotoStore</span>
        <span class="brand-tag">Platform</span>
      </div>
    </div>

    <nav class="nav">
      @for (item of navItems; track item.route) {
        <a class="nav-item" [routerLink]="item.route" routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: false }" [attr.aria-label]="item.label">
          <span class="nav-icon" aria-hidden="true" [innerHTML]="item.svg"></span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="user-section">
      <button class="user-btn" type="button" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
        <div class="user-avatar" aria-hidden="true">{{ userInitials() }}</div>
        <span class="user-email">{{ currentUser()?.email }}</span>
        <svg class="user-chevron" [class.user-chevron--open]="menuOpen()" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </button>
    </div>
  </aside>

  @if (menuOpen()) {
    <div class="backdrop" (click)="menuOpen.set(false)" aria-hidden="true"></div>
    <div class="ctx-menu" role="menu">
      <button class="ctx-item danger" role="menuitem" type="button" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
  }

  <main class="main" id="main-content">
    <router-outlet />
  </main>

</div>
